services:
  postgres:
    image: postgres:15
    container_name: etax_postgres
    restart: always
    environment:
      POSTGRES_DB: etax_db
      POSTGRES_USER: etax_user
      POSTGRES_PASSWORD: etax_pass
    ports:
      - "5432:5432"
    volumes:
      - etax_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: etax_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  etax_postgres_data: